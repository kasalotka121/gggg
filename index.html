<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Telegram iOS Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --accent: #0A84FF; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: #000; color: white;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.3s;
  }
  
  /* Темы оформления */
  .theme-dark { --bg: #000; --panel: rgba(28,28,30,0.75); --text: #fff; }
  .theme-light { --bg: #f2f2f7; --panel: rgba(255,255,255,0.8); --text: #000; }
  .theme-blue { --bg: #0e1621; --panel: rgba(23,33,43,0.9); --text: #fff; }

  .glass-panel {
    background: var(--panel);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.12);
  }
  
  .screen { position: fixed; inset: 0; background: var(--bg); z-index: 50; transition: transform 0.3s ease; }
  .screen-right { transform: translateX(100%); }
  .screen-active { transform: translateX(0); }

  .story-item { width: 66px; flex-shrink: 0; text-align: center; cursor: pointer; }
  .story-ring { width: 66px; height: 66px; border-radius: 50%; border: 2px solid var(--accent); padding: 2px; }
  .story-avatar { width: 100%; height: 100%; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 24px; }

  .msg-bubble { max-width: 75%; padding: 8px 14px; border-radius: 18px; margin-bottom: 4px; font-size: 16px; position: relative; }
  .msg-out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg-in { background: rgba(255,255,255,0.15); align-self: flex-start; border-bottom-left-radius: 4px; }
  
  .hidden { display: none; }
</style>
</head>
<body id="app-body" class="theme-dark">

<div id="auth-gate" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-10">
    <div class="w-20 h-20 bg-blue-500 rounded-2xl flex items-center justify-center text-4xl mb-6">✈️</div>
    <input id="my-user-input" type="text" placeholder="@username" class="w-full p-4 glass-panel rounded-xl mb-4 outline-none">
    <button onclick="initAccount()" class="w-full bg-blue-500 p-4 rounded-xl font-bold">Войти</button>
</div>

<div class="h-screen flex flex-col">
    <div class="p-4 pt-12 flex justify-between items-center">
        <h1 class="text-3xl font-bold">Чаты</h1>
        <button onclick="searchUser()" class="text-[#0A84FF] text-2xl">⊕</button>
    </div>

    <div id="stories-row" class="flex gap-4 px-4 py-2 overflow-x-auto">
        <div class="story-item" onclick="createStory()">
            <div class="story-ring" style="border-style: dashed; border-color: gray;">
                <div class="story-avatar">+</div>
            </div>
            <span class="text-[10px] mt-1 block">Ваша</span>
        </div>
        <div id="other-stories" class="flex gap-4"></div>
    </div>

    <div id="chats-list" class="flex-1 overflow-y-auto mt-2"></div>

    <div class="h-20 glass-panel flex justify-around items-center pb-4">
        <button onclick="renderChats()" class="flex flex-col items-center text-blue-500"><span>💬</span><span class="text-[10px]">Чаты</span></button>
        <button onclick="showSettings()" class="flex flex-col items-center text-gray-500"><span>⚙️</span><span class="text-[10px]">Настройки</span></button>
    </div>
</div>

<div id="chat-window" class="screen screen-right flex flex-col">
    <div class="h-20 glass-panel flex items-center px-4 pt-6 gap-3">
        <button onclick="closeScreen('chat-window')" class="text-blue-500">Назад</button>
        <div class="flex-1 flex items-center gap-2" onclick="openUserProfile()">
            <div id="chat-head-avatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold"></div>
            <div id="chat-head-name" class="font-bold"></div>
        </div>
        <button onclick="startCall('audio')" class="text-xl">📞</button>
        <button onclick="startCall('video')" class="text-xl">📹</button>
    </div>
    <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
    <div class="p-3 glass-panel flex items-end gap-2 pb-8">
        <button onclick="document.getElementById('file-input').click()" class="p-2 text-xl">📎</button>
        <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleMedia(this)">
        <textarea id="msg-input" class="flex-1 bg-white/10 rounded-xl p-2 outline-none resize-none" rows="1" placeholder="Сообщение"></textarea>
        <button onclick="send()" class="bg-blue-500 w-10 h-10 rounded-full flex items-center justify-center">⬆️</button>
    </div>
</div>

<div id="profile-window" class="screen screen-right overflow-y-auto">
    <div class="h-64 bg-gradient-to-b from-blue-500 to-black relative">
        <button onclick="closeScreen('profile-window')" class="absolute top-10 left-5 bg-black/40 px-3 py-1 rounded-full">✕</button>
        <div class="absolute bottom-5 left-5">
            <h2 id="p-name" class="text-3xl font-bold">Имя</h2>
            <p id="p-user" class="opacity-70">@user</p>
        </div>
    </div>
    <div class="p-4 space-y-4">
        <div class="glass-panel p-4 rounded-xl">
            <p class="text-xs text-gray-500">ИНФОРМАЦИЯ</p>
            <p id="p-bio">Статус пользователя...</p>
        </div>
        <div class="glass-panel p-4 rounded-xl">
            <p class="text-xs text-gray-500">ПОДАРКИ</p>
            <div id="p-gifts" class="flex gap-2 mt-2 text-2xl">🎁 💎 🍰</div>
        </div>
        <div id="p-stories-section" class="glass-panel p-4 rounded-xl">
            <p class="text-xs text-gray-500">ИСТОРИИ</p>
            <div id="p-stories-list" class="flex gap-2 mt-2"></div>
        </div>
    </div>
</div>

<script>
// --- ХРАНИЛИЩЕ ---
let db = JSON.parse(localStorage.getItem('tg_pro_db')) || {
    me: null,
    chats: {}, // key: username
    theme: 'theme-dark'
};

function save() { localStorage.setItem('tg_pro_db', JSON.stringify(db)); }

// --- ЛОГИКА ---
window.onload = () => {
    if(db.me) {
        document.getElementById('auth-gate').classList.add('hidden');
        document.body.className = db.theme;
        renderChats();
    }
};

function initAccount() {
    const user = document.getElementById('my-user-input').value;
    if(!user.startsWith('@')) return alert("Юзернейм должен быть с @");
    db.me = { username: user, stories: [] };
    save();
    location.reload();
}

function searchUser() {
    const target = prompt("Введите @username для поиска:");
    if(!target || !target.startsWith('@')) return;
    if(!db.chats[target]) {
        db.chats[target] = { name: target.slice(1), messages: [], bio: "Привет! Будем общаться?", gifts: ['🎁'], stories: [] };
    }
    openChat(target);
}

function openChat(user) {
    window.currentChat = user;
    const chat = db.chats[user];
    document.getElementById('chat-head-name').innerText = user;
    document.getElementById('chat-head-avatar').innerText = chat.name[0].toUpperCase();
    document.getElementById('chat-window').classList.add('screen-active');
    renderMessages();
}

function send() {
    const val = document.getElementById('msg-input').value;
    if(!val) return;
    db.chats[window.currentChat].messages.push({ text: val, type: 'text', from: 'me' });
    document.getElementById('msg-input').value = '';
    save();
    renderMessages();
}

function handleMedia(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        db.chats[window.currentChat].messages.push({ text: e.target.result, type: 'media', from: 'me' });
        save();
        renderMessages();
    };
    reader.readAsDataURL(file);
}

function renderMessages() {
    const box = document.getElementById('messages-container');
    box.innerHTML = db.chats[window.currentChat].messages.map(m => `
        <div class="msg-bubble ${m.from === 'me' ? 'msg-out' : 'msg-in'}">
            ${m.type === 'media' ? `<img src="${m.text}" class="rounded-lg">` : m.text}
        </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
}

function renderChats() {
    const list = document.getElementById('chats-list');
    list.innerHTML = Object.keys(db.chats).map(user => `
        <div onclick="openChat('${user}')" class="flex items-center gap-4 p-4 active:bg-white/10">
            <div class="w-14 h-14 rounded-full bg-blue-500 flex items-center justify-center font-bold text-xl">${user[1].toUpperCase()}</div>
            <div class="flex-1 border-b border-white/5 pb-2">
                <div class="flex justify-between font-bold"><span>${user}</span></div>
                <div class="text-sm opacity-50 truncate">${db.chats[user].messages.slice(-1)[0]?.text || 'Нет сообщений'}</div>
            </div>
        </div>
    `).join('');
}

function openUserProfile() {
    const user = window.currentChat;
    const data = db.chats[user];
    document.getElementById('p-name').innerText = data.name;
    document.getElementById('p-user').innerText = user;
    document.getElementById('p-bio').innerText = data.bio;
    document.getElementById('profile-window').classList.add('screen-active');
}

function createStory() {
    const url = prompt("Вставьте ссылку на фото или введите текст для истории:");
    if(!url) return;
    db.me.stories.push(url);
    save();
    alert("История опубликована!");
}

function startCall(type) {
    alert(`Звонок (${type}) пользователю ${window.currentChat}...`);
}

function showSettings() {
    const theme = prompt("Выберите тему: dark, light, blue");
    if(['dark','light','blue'].includes(theme)) {
        db.theme = 'theme-' + theme;
        document.body.className = db.theme;
        save();
    }
}

function closeScreen(id) { document.getElementById(id).classList.remove('screen-active'); renderChats(); }
</script>
</body>
</html>
